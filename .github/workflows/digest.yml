name: AI Digest

on:
  schedule:
    # 06:30 i 17:30 UTC (08:30 / 19:30 czasu polskiego latem)
    - cron: "30 6 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:        # rÄczne uruchomienie z zakĹadki Actions
  push:
    branches: [main]
    paths:
      - "config.yaml"       # zmiana konfiguracji = natychmiastowy rebuild

permissions:
  contents: write           # commit state.json + docs/
  pages: write
  id-token: write

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python digest.py

      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ state.json
          git diff --staged --quiet || git commit -m "digest: $(date -u +%Y-%m-%d\ %H:%M)"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
